<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Maker - बनाओ कोई भी PDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        canvas { image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges; box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4); }
        .modal { animation: modalPop 0.3s ease forwards; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-white min-h-screen">
    <div class="max-w-7xl mx-auto flex h-screen">
        <!-- Sidebar (same as before) -->
        <div class="w-96 bg-white border-r border-gray-200 shadow-xl flex flex-col">
            <div class="p-8 border-b border-gray-100">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold">📄</div>
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900">PDF Maker</h1>
                        <p class="text-sm text-gray-500">बनाओ और एडिट करो</p>
                    </div>
                </div>
            </div>

            <div class="p-6 border-b">
                <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">📏 Page Settings</h2>
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Page Size</label>
                        <select id="pageSize" class="w-full bg-white border border-gray-300 rounded-2xl px-4 py-3 focus:outline-none focus:border-indigo-500 transition-colors">
                            <option value="A4">A4 (210 × 297 mm)</option>
                            <option value="A5">A5 (148 × 210 mm)</option>
                            <option value="A3">A3 (297 × 420 mm)</option>
                            <option value="Letter">Letter (216 × 279 mm)</option>
                            <option value="Legal">Legal (216 × 356 mm)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Orientation</label>
                        <select id="orientation" class="w-full bg-white border border-gray-300 rounded-2xl px-4 py-3 focus:outline-none focus:border-indigo-500 transition-colors">
                            <option value="Portrait">Portrait</option>
                            <option value="Landscape">Landscape</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Page Background Color</label>
                        <div class="flex items-center gap-3">
                            <input type="color" id="bgColor" value="#ffffff" class="w-12 h-12 border border-gray-300 rounded-2xl cursor-pointer">
                            <span id="bgColorHex" class="font-mono text-sm text-gray-500">#ffffff</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-6 border-b">
                <h2 class="text-lg font-semibold text-gray-800 mb-4">Add Elements</h2>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="addTextElement()" class="flex flex-col items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white py-6 rounded-3xl transition-all active:scale-95">
                        <span class="text-3xl">Aa</span>
                        <span class="text-sm font-medium">Add Text</span>
                    </button>
                    <button onclick="document.getElementById('imageUpload').click()" class="flex flex-col items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white py-6 rounded-3xl transition-all active:scale-95">
                        <span class="text-3xl">🖼️</span>
                        <span class="text-sm font-medium">Upload Photo</span>
                    </button>
                </div>
                <input type="file" id="imageUpload" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
            </div>

            <div class="flex-1 flex flex-col min-h-0">
                <div class="px-6 py-4 border-b bg-gray-50 flex justify-between items-center">
                    <h3 class="font-semibold text-gray-700">Your Elements (<span id="elementCount" class="text-indigo-600">0</span>)</h3>
                    <button onclick="clearAll()" class="text-xs px-3 py-1 text-red-600 hover:bg-red-50 rounded-xl transition-colors">Clear All</button>
                </div>
                <div id="elementsList" class="flex-1 overflow-auto p-4 space-y-3"></div>
            </div>

            <div class="p-6 border-t bg-white">
                <button onclick="generatePDF()" class="w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 text-white font-semibold py-4 rounded-3xl text-lg shadow-lg shadow-indigo-500/30 transition-all active:scale-95 flex items-center justify-center gap-3">
                    <span>⬇️ Download PDF</span>
                </button>
            </div>
        </div>

        <!-- Preview Area (same) -->
        <div class="flex-1 flex flex-col">
            <div class="h-16 border-b bg-white flex items-center px-8 justify-between">
                <div class="flex items-center gap-4">
                    <div class="text-2xl">📄</div>
                    <div>
                        <h2 class="font-semibold text-xl text-gray-900">Live Preview</h2>
                        <p class="text-xs text-gray-500">Click elements to edit • Positions in mm</p>
                    </div>
                </div>
            </div>
            
            <div class="flex-1 flex items-center justify-center p-12 bg-gradient-to-br from-gray-100 to-gray-200 overflow-auto">
                <div class="relative">
                    <div id="paper" class="bg-white overflow-hidden">
                        <canvas id="previewCanvas" class="border-8 border-gray-900"></canvas>
                    </div>
                    <div class="absolute -inset-4 bg-gradient-to-br from-black/10 to-transparent -z-10 rounded-[3rem] -rotate-1"></div>
                </div>
            </div>

            <div class="h-14 bg-white border-t flex items-center px-8 text-xs text-gray-500 justify-between">
                <div>Improved image quality & sizing • Comedy king edition 🚀</div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="modal bg-white rounded-3xl shadow-2xl w-full max-w-lg mx-4 overflow-hidden">
            <div id="modalHeader" class="px-8 py-6 border-b flex items-center justify-between bg-gradient-to-r from-indigo-50 to-white">
                <h3 id="modalTitle" class="text-2xl font-semibold text-gray-900"></h3>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center text-3xl text-gray-400 hover:text-gray-600 transition-colors">×</button>
            </div>
            
            <div id="modalBody" class="p-8 space-y-8"></div>
            
            <div class="px-8 py-6 border-t flex gap-3 justify-end bg-gray-50">
                <button onclick="closeModal()" class="px-8 py-3 text-gray-600 font-medium hover:bg-gray-100 rounded-2xl transition-colors">Cancel</button>
                <button onclick="saveModalData()" class="px-10 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-2xl transition-all">Save Element</button>
            </div>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        
        let elements = [];
        let pageSize = "A4";
        let orientation = "Portrait";
        let bgColor = "#ffffff";
        
        let currentEditIndex = -1;
        let currentModalType = "";
        let tempImageData = null;
        
        const pageFormats = {
            "A4": [210, 297],
            "A5": [148, 210],
            "A3": [297, 420],
            "Letter": [216, 279],
            "Legal": [216, 356]
        };
        
        let canvas = document.getElementById("previewCanvas");
        let ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        
        function getPageDims() {
            let base = [...pageFormats[pageSize]];
            if (orientation === "Landscape") base.reverse();
            return { w: base[0], h: base[1] };
        }
        
        function hexToRgb(hex) {
            const r = parseInt(hex.substr(1,2), 16);
            const g = parseInt(hex.substr(3,2), 16);
            const b = parseInt(hex.substr(5,2), 16);
            return { r, g, b };
        }
        
        function updatePreview() {
            const dims = getPageDims();
            const pageW = dims.w;
            const pageH = dims.h;
            
            let canvasWidth = 620;
            let scale = canvasWidth / pageW;
            let canvasHeight = Math.round(pageH * scale);
            
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            
            const pxPerMm = scale;
            
            elements.forEach(el => {
                if (el.type === "text") {
                    ctx.fillStyle = el.color;
                    const fontPx = el.fontSizePt * pxPerMm * 0.92;
                    ctx.font = `${fontPx}px Inter, Arial`;
                    
                    const lines = el.text.split('\n');
                    let y = el.y * pxPerMm + fontPx * 0.75;
                    const lineH = fontPx * 1.18;
                    
                    for (let line of lines) {
                        ctx.fillText(line, el.x * pxPerMm, y);
                        y += lineH;
                    }
                } 
                else if (el.type === "image" && el.img) {
                    const iw = el.widthMm * pxPerMm;
                    const ih = el.heightMm * pxPerMm;
                    ctx.drawImage(el.img, el.x * pxPerMm, el.y * pxPerMm, iw, ih);
                }
            });
        }
        
        function renderElementsList() {
            const container = document.getElementById("elementsList");
            container.innerHTML = "";
            document.getElementById("elementCount").textContent = elements.length;
            
            if (elements.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-gray-400"><div class="text-6xl mb-3">📭</div><p>No elements yet</p></div>`;
                return;
            }
            
            elements.forEach((el, i) => {
                const div = document.createElement("div");
                div.className = "group bg-white border border-gray-200 rounded-2xl p-4 hover:border-indigo-300 transition-all flex items-center";
                
                let html = el.type === "text" 
                    ? `<div class="flex-1 min-w-0"><div class="text-xs text-gray-500 mb-0.5">TEXT</div><div class="font-medium text-gray-800 line-clamp-2">${el.text.replace(/\n/g, ' ')}</div><div class="text-xs text-gray-400 mt-2">${el.fontSizePt} pt • ${el.x.toFixed(1)},${el.y.toFixed(1)} mm</div></div>`
                    : `<div class="flex-1 min-w-0 flex items-center gap-3"><img src="${el.dataUrl}" class="w-14 h-14 object-cover rounded-xl border"><div><div class="text-xs text-emerald-600">IMAGE</div><div class="text-xs text-gray-400">${el.sizeMode || 'Custom'}</div></div></div>`;
                
                div.innerHTML = `
                    ${html}
                    <div class="flex gap-1 opacity-40 group-hover:opacity-100 transition-all">
                        <button onclick="editElement(${i}); event.stopPropagation()" class="w-9 h-9 flex items-center justify-center hover:bg-indigo-100 rounded-xl text-indigo-600">✏️</button>
                        <button onclick="deleteElement(${i}); event.stopPropagation()" class="w-9 h-9 flex items-center justify-center hover:bg-red-100 rounded-xl text-red-600">🗑️</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        function refreshAll() {
            updatePreview();
            renderElementsList();
        }
        
        function showModal(type, index = -1) {
            currentModalType = type;
            currentEditIndex = index;
            
            const modal = document.getElementById("modal");
            const titleEl = document.getElementById("modalTitle");
            const body = document.getElementById("modalBody");
            
            modal.classList.remove("hidden");
            
            let html = "";
            
            if (type === "text") {
                // same as before (keeping text modal unchanged)
                titleEl.textContent = index === -1 ? "Add New Text" : "Edit Text";
                const el = index === -1 ? {text: "", fontSizePt: 18, color: "#111111", x: 25, y: 60} : elements[index];
                
                html = `
                    <div class="space-y-6">
                        <div>
                            <label class="text-xs uppercase tracking-widest text-gray-500 block mb-2">Your Text</label>
                            <textarea id="modalTextInput" rows="5" class="w-full resize-y border border-gray-300 focus:border-indigo-500 rounded-2xl p-5 text-lg leading-relaxed">${el.text}</textarea>
                        </div>
                        <div class="grid grid-cols-3 gap-4">
                            <div>
                                <label class="text-xs uppercase tracking-widest text-gray-500 block mb-2">Font Size (pt)</label>
                                <input type="number" id="modalFont" value="${el.fontSizePt}" min="6" max="120" class="w-full border border-gray-300 focus:border-indigo-500 rounded-2xl px-5 py-4 text-center text-2xl font-medium">
                            </div>
                            <div>
                                <label class="text-xs uppercase tracking-widest text-gray-500 block mb-2">Color</label>
                                <input type="color" id="modalTextColor" value="${el.color}" class="w-full h-14 border border-gray-300 rounded-2xl cursor-pointer">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-xs uppercase tracking-widest text-gray-500 block mb-2">X (mm)</label><input type="number" id="modalX" value="${el.x}" step="0.5" class="w-full border border-gray-300 focus:border-indigo-500 rounded-2xl px-5 py-4 text-center text-xl"></div>
                            <div><label class="text-xs uppercase tracking-widest text-gray-500 block mb-2">Y (mm)</label><input type="number" id="modalY" value="${el.y}" step="0.5" class="w-full border border-gray-300 focus:border-indigo-500 rounded-2xl px-5 py-4 text-center text-xl"></div>
                        </div>
                    </div>
                `;
            } 
            else if (type === "image") {
                titleEl.textContent = index === -1 ? "Place Your Photo" : "Adjust Photo Size";
                const el = index === -1 ? tempImageData : elements[index];
                
                html = `
                    <div class="flex justify-center mb-8">
                        <img src="${el.dataUrl}" class="max-h-56 rounded-2xl shadow-inner border border-gray-100 object-contain">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-6">
                        <button onclick="setImageSize('full')" class="bg-gradient-to-br from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-bold py-8 px-6 rounded-3xl text-xl shadow-lg transition-all active:scale-95">
                            Full Page<br><span class="text-sm opacity-90">(फुल पेज फिट)</span>
                        </button>
                        <button onclick="setImageSize('half')" class="bg-gradient-to-br from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-bold py-8 px-6 rounded-3xl text-xl shadow-lg transition-all active:scale-95">
                            Half Page<br><span class="text-sm opacity-90">(आधा पेज)</span>
                        </button>
                    </div>
                    
                    <p class="text-center text-sm text-gray-500 mt-8">Photo aspect ratio बरकरार रहेगा • centered रहेगा</p>
                    
                    <!-- Hidden fields for position & size -->
                    <input type="hidden" id="modalImgX" value="${el.x}">
                    <input type="hidden" id="modalImgY" value="${el.y}">
                    <input type="hidden" id="modalImgWidth" value="${el.widthMm}">
                    <input type="hidden" id="modalImgHeight" value="${el.heightMm}">
                `;
            }
            
            body.innerHTML = html;
        }
        
        function setImageSize(mode) {
            const dims = getPageDims();
            const pageW = dims.w;
            const pageH = dims.h;
            
            const img = tempImageData?.img || (currentEditIndex >= 0 ? elements[currentEditIndex].img : null);
            if (!img) return;
            
            const aspect = img.height / img.width;
            
            let targetW, targetH, x, y;
            
            if (mode === 'full') {
                if (aspect > pageH / pageW) {
                    // tall image
                    targetH = pageH * 0.98;
                    targetW = targetH / aspect;
                } else {
                    targetW = pageW * 0.98;
                    targetH = targetW * aspect;
                }
                x = (pageW - targetW) / 2;
                y = (pageH - targetH) / 2;
            } else { // half
                targetW = pageW * 0.5;
                targetH = targetW * aspect;
                if (targetH > pageH * 0.9) {
                    targetH = pageH * 0.9;
                    targetW = targetH / aspect;
                }
                x = (pageW - targetW) / 2;
                y = (pageH - targetH) / 2;
            }
            
            document.getElementById("modalImgWidth").value = targetW.toFixed(1);
            document.getElementById("modalImgHeight").value = targetH.toFixed(1);
            document.getElementById("modalImgX").value = x.toFixed(1);
            document.getElementById("modalImgY").value = y.toFixed(1);
        }
        
        function saveModalData() {
            if (currentModalType === "text") {
                const text = document.getElementById("modalTextInput").value.trim();
                if (!text) return alert("Please write something ✨");
                
                const newElement = {
                    type: "text",
                    text,
                    fontSizePt: parseFloat(document.getElementById("modalFont").value) || 18,
                    color: document.getElementById("modalTextColor").value,
                    x: parseFloat(document.getElementById("modalX").value) || 25,
                    y: parseFloat(document.getElementById("modalY").value) || 60
                };
                
                if (currentEditIndex === -1) elements.push(newElement);
                else elements[currentEditIndex] = newElement;
            } 
            else if (currentModalType === "image") {
                const newElement = {
                    type: "image",
                    dataUrl: tempImageData ? tempImageData.dataUrl : elements[currentEditIndex].dataUrl,
                    img: tempImageData ? tempImageData.img : elements[currentEditIndex].img,
                    x: parseFloat(document.getElementById("modalImgX").value) || 30,
                    y: parseFloat(document.getElementById("modalImgY").value) || 30,
                    widthMm: parseFloat(document.getElementById("modalImgWidth").value) || 100,
                    heightMm: parseFloat(document.getElementById("modalImgHeight").value) || 80,
                    sizeMode: document.getElementById("modalImgWidth").value > 150 ? 'full' : 'half'
                };
                
                if (currentEditIndex === -1) {
                    elements.push(newElement);
                    tempImageData = null;
                } else {
                    elements[currentEditIndex] = newElement;
                }
            }
            
            closeModal();
            refreshAll();
        }
        
        function closeModal() {
            document.getElementById("modal").classList.add("hidden");
            tempImageData = null;
        }
        
        function addTextElement() {
            showModal("text", -1);
        }
        
        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(ev) {
                const dataUrl = ev.target.result;
                const img = new Image();
                img.onload = function() {
                    tempImageData = {
                        dataUrl,
                        img,
                        widthMm: 110,
                        heightMm: 110 * (img.height / img.width),
                        x: 40,
                        y: 60
                    };
                    showModal("image", -1);
                    // Auto apply full page on upload (optional - remove if you don't want)
                    setTimeout(() => setImageSize('full'), 100);
                };
                img.src = dataUrl;
            };
            reader.readAsDataURL(file);
            e.target.value = "";
        }
        
        function editElement(index) {
            showModal(elements[index].type, index);
        }
        
        function deleteElement(index) {
            if (confirm("Delete this?")) {
                elements.splice(index, 1);
                refreshAll();
            }
        }
        
        function clearAll() {
            if (confirm("Clear page?")) {
                elements = [];
                refreshAll();
            }
        }
        
        function generatePDF() {
            const dims = getPageDims();
            const pdf = new jsPDF({
                orientation: orientation === "Portrait" ? "p" : "l",
                unit: "mm",
                format: [dims.w, dims.h],
                compress: true
            });
            
            const rgb = hexToRgb(bgColor);
            pdf.setFillColor(rgb.r, rgb.g, rgb.b);
            pdf.rect(0, 0, dims.w, dims.h, "F");
            
            elements.forEach(el => {
                if (el.type === "text") {
                    pdf.setFontSize(el.fontSizePt);
                    const trgb = hexToRgb(el.color);
                    pdf.setTextColor(trgb.r, trgb.g, trgb.b);
                    
                    const lines = el.text.split("\n");
                    let yPos = el.y;
                    const lineH = el.fontSizePt * 1.15;
                    
                    lines.forEach(line => {
                        pdf.text(line, el.x, yPos);
                        yPos += lineH;
                    });
                } 
                else if (el.type === "image") {
                    const format = el.dataUrl.includes("png") ? "PNG" : "JPEG";
                    pdf.addImage(el.dataUrl, format, el.x, el.y, el.widthMm, el.heightMm, null, 'FAST');
                }
            });
            
            pdf.save(`my-pdf-${new Date().toISOString().slice(0,10)}.pdf`);
        }
        
        function initListeners() {
            document.getElementById("pageSize").addEventListener("change", e => { pageSize = e.target.value; refreshAll(); });
            document.getElementById("orientation").addEventListener("change", e => { orientation = e.target.value; refreshAll(); });
            document.getElementById("bgColor").addEventListener("change", e => {
                bgColor = e.target.value;
                document.getElementById("bgColorHex").textContent = bgColor;
                refreshAll();
            });
        }
        
        window.onload = function() {
            initListeners();
            refreshAll();
        };
    </script>
</body>
</html>
