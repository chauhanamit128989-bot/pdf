<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDF Maker - Mobile Friendly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        canvas { 
            image-rendering: -webkit-optimize-contrast; 
            image-rendering: crisp-edges; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            max-width: 100%; 
            height: auto; 
        }
        .modal { animation: modalPop 0.3s ease forwards; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.92) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @media (max-width: 640px) {
            .sidebar { 
                position: fixed; 
                bottom: 0; 
                left: 0; 
                right: 0; 
                height: auto; 
                max-height: 55vh; 
                overflow-y: auto; 
                border-radius: 20px 20px 0 0; 
                box-shadow: 0 -10px 30px rgba(0,0,0,0.2); 
                z-index: 10; 
            }
            .preview-area { padding-bottom: 220px; } /* space for bottom bar */
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-gray-100 min-h-screen">

    <div class="flex flex-col md:flex-row h-screen">
        <!-- Sidebar / Bottom controls on mobile -->
        <div class="sidebar w-full md:w-96 bg-white border-t md:border-r md:border-gray-200 shadow-2xl flex flex-col md:order-first order-last">
            <div class="p-5 md:p-8 border-b border-gray-100 hidden md:block">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold">📄</div>
                    <div>
                        <h1 class="text-2xl md:text-3xl font-bold text-gray-900">PDF Maker</h1>
                        <p class="text-sm text-gray-500">Mobile Friendly 🚀</p>
                    </div>
                </div>
            </div>

            <!-- Page Settings -->
            <div class="p-4 md:p-6 border-b grid grid-cols-2 md:grid-cols-1 gap-4">
                <div>
                    <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Page Size</label>
                    <select id="pageSize" class="w-full bg-white border border-gray-300 rounded-xl px-3 py-2.5 md:py-3 text-sm focus:outline-none focus:border-indigo-500">
                        <option value="A4">A4</option>
                        <option value="A5">A5</option>
                        <option value="A3">A3</option>
                        <option value="Letter">Letter</option>
                        <option value="Legal">Legal</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Orientation</label>
                    <select id="orientation" class="w-full bg-white border border-gray-300 rounded-xl px-3 py-2.5 md:py-3 text-sm focus:outline-none focus:border-indigo-500">
                        <option value="Portrait">Portrait</option>
                        <option value="Landscape">Landscape</option>
                    </select>
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">BG Color</label>
                    <div class="flex items-center gap-3">
                        <input type="color" id="bgColor" value="#ffffff" class="w-10 h-10 md:w-12 md:h-12 border border-gray-300 rounded-xl cursor-pointer">
                        <span id="bgColorHex" class="font-mono text-xs md:text-sm text-gray-500">#ffffff</span>
                    </div>
                </div>
            </div>

            <!-- Add Elements -->
            <div class="p-4 md:p-6 border-b">
                <h2 class="text-base md:text-lg font-semibold text-gray-800 mb-3 md:mb-4">Add</h2>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="addTextElement()" class="flex flex-col items-center gap-1.5 bg-indigo-600 hover:bg-indigo-700 text-white py-4 md:py-6 rounded-2xl text-sm md:text-base transition-all active:scale-95">
                        <span class="text-2xl md:text-3xl">Aa</span>
                        <span>Text</span>
                    </button>
                    <button onclick="document.getElementById('imageUpload').click()" class="flex flex-col items-center gap-1.5 bg-emerald-600 hover:bg-emerald-700 text-white py-4 md:py-6 rounded-2xl text-sm md:text-base transition-all active:scale-95">
                        <span class="text-2xl md:text-3xl">🖼️</span>
                        <span>Photo</span>
                    </button>
                </div>
                <input type="file" id="imageUpload" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
            </div>

            <!-- Elements List (scrollable) -->
            <div class="flex-1 overflow-y-auto p-4 space-y-3 hidden md:block">
                <h3 class="font-semibold text-gray-700 mb-2">Elements (<span id="elementCount">0</span>)</h3>
                <div id="elementsList" class="space-y-3"></div>
            </div>

            <!-- Download Button -->
            <div class="p-4 border-t bg-white sticky bottom-0 md:relative">
                <button onclick="generatePDF()" class="w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 text-white font-semibold py-4 rounded-2xl text-lg shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                    <span>⬇️ Download PDF</span>
                </button>
            </div>
        </div>

        <!-- Preview Area -->
        <div class="preview-area flex-1 flex flex-col overflow-hidden">
            <div class="h-14 md:h-16 border-b bg-white flex items-center px-4 md:px-8 justify-between">
                <div class="flex items-center gap-3">
                    <div class="text-2xl">📄</div>
                    <h2 class="font-semibold text-lg md:text-xl text-gray-900">Live Preview</h2>
                </div>
                <button onclick="clearAll()" class="text-red-600 text-sm md:hidden">Clear</button>
            </div>
            
            <div class="flex-1 flex items-center justify-center p-4 md:p-12 bg-gradient-to-br from-gray-100 to-gray-200 overflow-auto">
                <div class="relative w-full max-w-[90%] md:max-w-[620px]">
                    <div class="bg-white rounded-2xl overflow-hidden border-4 md:border-8 border-gray-800">
                        <canvas id="previewCanvas" class="w-full h-auto"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal (full width on mobile) -->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div class="modal bg-white rounded-3xl shadow-2xl w-full max-w-lg md:max-w-2xl mx-auto max-h-[90vh] overflow-y-auto">
            <div class="px-6 py-5 border-b flex items-center justify-between bg-gradient-to-r from-indigo-50 to-white sticky top-0 z-10">
                <h3 id="modalTitle" class="text-xl md:text-2xl font-semibold text-gray-900"></h3>
                <button onclick="closeModal()" class="text-3xl text-gray-500 hover:text-gray-700">×</button>
            </div>
            <div id="modalBody" class="p-6 md:p-8"></div>
            <div class="px-6 py-5 border-t flex gap-3 justify-end bg-gray-50 sticky bottom-0">
                <button onclick="closeModal()" class="px-6 py-3 text-gray-600 font-medium hover:bg-gray-100 rounded-xl">Cancel</button>
                <button onclick="saveModalData()" class="px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl">Save</button>
            </div>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let elements = [];
        let pageSize = "A4";
        let orientation = "Portrait";
        let bgColor = "#ffffff";
        let currentEditIndex = -1;
        let currentModalType = "";
        let tempImageData = null;

        const pageFormats = {
            "A4": [210, 297],
            "A5": [148, 210],
            "A3": [297, 420],
            "Letter": [216, 279],
            "Legal": [216, 356]
        };

        let canvas = document.getElementById("previewCanvas");
        let ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';

        function getPageDims() {
            let base = [...pageFormats[pageSize]];
            if (orientation === "Landscape") base.reverse();
            return { w: base[0], h: base[1] };
        }

        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : { r: 255, g: 255, b: 255 };
        }

        function updatePreview() {
            const dims = getPageDims();
            const pageW = dims.w;
            const pageH = dims.h;

            // Responsive canvas size
            let maxWidth = Math.min(window.innerWidth * 0.9, 620);
            let scale = maxWidth / pageW;
            let canvasHeight = Math.round(pageH * scale);

            canvas.width = maxWidth;
            canvas.height = canvasHeight;

            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const pxPerMm = scale;

            elements.forEach(el => {
                if (el.type === "text") {
                    ctx.fillStyle = el.color;
                    const fontPx = el.fontSizePt * pxPerMm * 0.92;
                    ctx.font = `${fontPx}px Arial, sans-serif`;

                    const lines = el.text.split('\n');
                    let y = el.y * pxPerMm + fontPx * 0.8;
                    const lineH = fontPx * 1.2;

                    lines.forEach(line => {
                        ctx.fillText(line, el.x * pxPerMm, y);
                        y += lineH;
                    });
                } else if (el.type === "image" && el.img) {
                    ctx.drawImage(el.img, el.x * pxPerMm, el.y * pxPerMm, el.widthMm * pxPerMm, el.heightMm * pxPerMm);
                }
            });
        }

        function renderElementsList() {
            const container = document.getElementById("elementsList");
            if (!container) return;
            container.innerHTML = "";
            document.getElementById("elementCount").textContent = elements.length;

            if (elements.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-gray-400">No elements yet</div>';
                return;
            }

            elements.forEach((el, i) => {
                const div = document.createElement("div");
                div.className = "bg-gray-50 border rounded-xl p-3 flex justify-between items-center";
                div.innerHTML = `
                    <div>
                        <div class="font-medium">${el.type.toUpperCase()} ${el.type === 'text' ? '- ' + el.text.substring(0,20) + '...' : ''}</div>
                        <div class="text-xs text-gray-500">${el.type === 'text' ? el.fontSizePt + 'pt' : (el.sizeMode || 'Custom')}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editElement(${i})" class="text-indigo-600">Edit</button>
                        <button onclick="deleteElement(${i})" class="text-red-600">Delete</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function refreshAll() {
            updatePreview();
            renderElementsList();
        }

        function showModal(type, index = -1) {
            currentModalType = type;
            currentEditIndex = index;
            const modal = document.getElementById("modal");
            modal.classList.remove("hidden");

            const title = document.getElementById("modalTitle");
            const body = document.getElementById("modalBody");

            let html = "";

            if (type === "text") {
                title.textContent = index === -1 ? "Add Text" : "Edit Text";
                const el = index === -1 ? {text:"", fontSizePt:20, color:"#000000", x:30, y:50} : elements[index];
                html = `
                    <textarea id="modalText" rows="6" class="w-full p-4 border rounded-xl text-lg">${el.text}</textarea>
                    <div class="grid grid-cols-2 gap-4 mt-6">
                        <div>
                            <label class="block text-sm mb-1">Font Size (pt)</label>
                            <input type="number" id="modalFont" value="${el.fontSizePt}" min="8" max="100" class="w-full p-3 border rounded-xl">
                        </div>
                        <div>
                            <label class="block text-sm mb-1">Color</label>
                            <input type="color" id="modalColor" value="${el.color}" class="w-full h-12 border rounded-xl">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mt-4">
                        <div><label class="block text-sm mb-1">X (mm)</label><input type="number" id="modalX" value="${el.x}" step="1" class="w-full p-3 border rounded-xl"></div>
                        <div><label class="block text-sm mb-1">Y (mm)</label><input type="number" id="modalY" value="${el.y}" step="1" class="w-full p-3 border rounded-xl"></div>
                    </div>
                `;
            } else if (type === "image") {
                title.textContent = index === -1 ? "Place Photo" : "Adjust Photo";
                const el = index === -1 ? tempImageData : elements[index];
                html = `
                    <div class="text-center mb-6">
                        <img src="${el.dataUrl}" class="max-h-48 mx-auto rounded-xl shadow">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="setImageSize('full')" class="bg-emerald-600 text-white py-6 rounded-2xl text-lg font-bold active:scale-95">Full Page</button>
                        <button onclick="setImageSize('half')" class="bg-blue-600 text-white py-6 rounded-2xl text-lg font-bold active:scale-95">Half Page</button>
                    </div>
                    <input type="hidden" id="modalImgX" value="${el.x}">
                    <input type="hidden" id="modalImgY" value="${el.y}">
                    <input type="hidden" id="modalImgW" value="${el.widthMm}">
                    <input type="hidden" id="modalImgH" value="${el.heightMm}">
                `;
            }

            body.innerHTML = html;
        }

        function setImageSize(mode) {
            const dims = getPageDims();
            const pageW = dims.w, pageH = dims.h;
            const img = tempImageData?.img || (currentEditIndex >= 0 ? elements[currentEditIndex].img : null);
            if (!img) return;

            const aspect = img.height / img.width;
            let w, h, x, y;

            if (mode === 'full') {
                if (aspect > pageH / pageW) { h = pageH * 0.95; w = h / aspect; }
                else { w = pageW * 0.95; h = w * aspect; }
                x = (pageW - w) / 2; y = (pageH - h) / 2;
            } else {
                w = pageW * 0.5; h = w * aspect;
                if (h > pageH * 0.8) { h = pageH * 0.8; w = h / aspect; }
                x = (pageW - w) / 2; y = (pageH - h) / 2;
            }

            document.getElementById("modalImgW").value = w.toFixed(1);
            document.getElementById("modalImgH").value = h.toFixed(1);
            document.getElementById("modalImgX").value = x.toFixed(1);
            document.getElementById("modalImgY").value = y.toFixed(1);
        }

        function saveModalData() {
            if (currentModalType === "text") {
                const text = document.getElementById("modalText").value.trim();
                if (!text) return alert("Text likho bhai!");
                elements[currentEditIndex === -1 ? 'push' : currentEditIndex] = {
                    type: "text",
                    text,
                    fontSizePt: parseFloat(document.getElementById("modalFont").value) || 20,
                    color: document.getElementById("modalColor").value,
                    x: parseFloat(document.getElementById("modalX").value) || 30,
                    y: parseFloat(document.getElementById("modalY").value) || 50
                };
            } else if (currentModalType === "image") {
                const newEl = {
                    type: "image",
                    dataUrl: tempImageData ? tempImageData.dataUrl : elements[currentEditIndex].dataUrl,
                    img: tempImageData ? tempImageData.img : elements[currentEditIndex].img,
                    x: parseFloat(document.getElementById("modalImgX").value),
                    y: parseFloat(document.getElementById("modalImgY").value),
                    widthMm: parseFloat(document.getElementById("modalImgW").value),
                    heightMm: parseFloat(document.getElementById("modalImgH").value)
                };
                if (currentEditIndex === -1) elements.push(newEl);
                else elements[currentEditIndex] = newEl;
                tempImageData = null;
            }
            closeModal();
            refreshAll();
        }

        function closeModal() { document.getElementById("modal").classList.add("hidden"); }

        function addTextElement() { showModal("text", -1); }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                const dataUrl = ev.target.result;
                const img = new Image();
                img.onload = () => {
                    tempImageData = { dataUrl, img, widthMm: 100, heightMm: 100 * (img.height/img.width), x: 30, y: 40 };
                    showModal("image", -1);
                    setTimeout(() => setImageSize('full'), 150);
                };
                img.src = dataUrl;
            };
            reader.readAsDataURL(file);
            e.target.value = "";
        }

        function editElement(i) { showModal(elements[i].type, i); }

        function deleteElement(i) {
            if (confirm("Delete karu?")) {
                elements.splice(i, 1);
                refreshAll();
            }
        }

        function clearAll() {
            if (confirm("Saara clear?")) {
                elements = [];
                refreshAll();
            }
        }

        function generatePDF() {
            const dims = getPageDims();
            const pdf = new jsPDF({
                orientation: orientation.toLowerCase().charAt(0),
                unit: "mm",
                format: [dims.w, dims.h]
            });

            const rgb = hexToRgb(bgColor);
            pdf.setFillColor(rgb.r, rgb.g, rgb.b);
            pdf.rect(0, 0, dims.w, dims.h, "F");

            elements.forEach(el => {
                if (el.type === "text") {
                    pdf.setFontSize(el.fontSizePt);
                    pdf.setTextColor(...Object.values(hexToRgb(el.color)));
                    let y = el.y;
                    el.text.split('\n').forEach(line => {
                        pdf.text(line, el.x, y);
                        y += el.fontSizePt * 0.3528 * 1.2;
                    });
                } else if (el.type === "image") {
                    pdf.addImage(el.dataUrl, el.dataUrl.includes('png')?'PNG':'JPEG', el.x, el.y, el.widthMm, el.heightMm, null, 'FAST');
                }
            });

            pdf.save(`pdf-maker-${Date.now()}.pdf`);
        }

        // Listeners
        document.getElementById("pageSize").addEventListener("change", e => { pageSize = e.target.value; refreshAll(); });
        document.getElementById("orientation").addEventListener("change", e => { orientation = e.target.value; refreshAll(); });
        document.getElementById("bgColor").addEventListener("change", e => {
            bgColor = e.target.value;
            document.getElementById("bgColorHex").textContent = bgColor;
            refreshAll();
        });

        // Resize handling
        window.addEventListener('resize', refreshAll);

        // Start
        window.onload = () => {
            refreshAll();
            // Optional demo content
            elements = [
                {type:"text", text:"Hello Mobile!", fontSizePt:36, color:"#4f46e5", x:40, y:80}
            ];
            refreshAll();
        };
    </script>
</body>
</html>
